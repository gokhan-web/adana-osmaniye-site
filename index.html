<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adana Tanıtımı</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Başlık -->
<header>
    <h1 class="fade-in">Adana</h1>
    <p class="fade-in delay-1">Güneyin güzelliklerini keşfedin!</p>
</header>

<!-- Adana Bölümü -->
<section class="city slide-in" id="adana">
    <h2>Adana’nın Güzellikleri</h2>
    <div class="gallery">
        <img src="https://images.pexels.com/photos/17701405/pexels-photo-17701405.jpeg" alt="Adana Merkez Camii">
        <img src="https://images.pexels.com/photos/17701406/pexels-photo-17701406.jpeg" alt="Adana Merkez Camii Nehir Manzarası">
        <img src="https://images.pexels.com/photos/19535026/pexels-photo-19535026.jpeg" alt="Varda Köprüsü">
        <img src="https://images.pexels.com/photos/29505211/pexels-photo-29505211.jpeg" alt="Varda Köprüsü Manzara">
        <img src="https://www.trthaber.com/foto-galeri/cukurovanin-gizli-cenneti-kup-selaleleri/16434/7.jpg" alt="Aladağ Küp Şelaleleri">
        <img src="https://live.staticflickr.com/65535/33778554712_7b64c1babc_b.jpg" alt="9 Oluk / Dokuzoluk Kanyonu">
    </div>
    <p>Adana, tarihi camileri, köprüleri, doğal şelaleleri ve kanyonları ile Güney’in en güzel şehirlerinden biridir.</p>
</section>

<!-- Osmaniye Yükleniyor Barı -->
<section class="loading-bar-section">
    <h3>Osmaniye ekleniyor...</h3>
    <div class="loading-bar">
        <div class="progress" id="osmaniye-progress"></div>
    </div>
</section>

<!-- Kaydırmalı Galeri -->
<section class="slider slide-in delay-2">
    <h2>Öne Çıkan Görseller</h2>
    <div class="slider-wrapper">
        <img src="https://images.pexels.com/photos/17701405/pexels-photo-17701405.jpeg" alt="Adana Merkez Camii">
        <img src="https://images.pexels.com/photos/19535026/pexels-photo-19535026.jpeg" alt="Varda Köprüsü">
        <img src="https://www.trthaber.com/foto-galeri/cukurovanin-gizli-cenneti-kup-selaleleri/16434/7.jpg" alt="Aladağ Küp Şelaleleri">
    </div>
</section>

<script src="js/script.js"></script>
</body>
</html>
