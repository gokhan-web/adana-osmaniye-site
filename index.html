<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adana & Osmaniye</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Başlık -->
    <header>
        <h1 class="fade-in">Adana & Osmaniye</h1>
        <p class="fade-in delay-1">Güneyin güzelliklerini keşfedin!</p>
    </header>

    <!-- Adana Bölümü -->
    <section class="city slide-in" id="adana">
        <h2>Adana</h2>
        <img class="fade-img" src="https://dynamic-media-cdn.tripadvisor.com/media/photo-o/05/71/14/21/adana-merkez-camii.jpg?h=500&s=1&w=500" alt="Adana Manzarası">
        <p>Adana, lezzetli kebapları ve tarihi yerleri ile ünlüdür.</p>
    </section>

    <!-- Osmaniye Bölümü -->
    <section class="city slide-in delay-1" id="osmaniye">
        <h2>Osmaniye</h2>
        <img class="fade-img" src="https://dynamic-media-cdn.tripadvisor.com/media/photo-o/1a/98/f2/d3/known-as-hierapolis-in.jpg?h=400&s=1&w=600" alt="Osmaniye Manzarası">
        <p>Osmaniye, doğal güzellikleri ve antik kalıntıları ile dikkat çeker.</p>
    </section>

    <script src="js/script.js"></script>
</body>
</html>
