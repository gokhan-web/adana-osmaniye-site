<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adana Tanıtımı</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Başlık -->
<header>
    <h1 class="fade-in">Adana</h1>
    <p class="fade-in delay-1">Güneyin güzelliklerini keşfedin!</p>
</header>

<!-- Adana Bölümü -->
<section class="city slide-in" id="adana">
    <h2>Adana’nın Güzellikleri</h2>
    <div class="gallery">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3d/Sabanci_Merkez_Camii_1.jpg" alt="Adana Merkez Camii">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/ee/Stone_Bridge_%28Adana%29.jpg" alt="Adana Taş Köprü">
        <img src="https://media-cdn.tripadvisor.com/media/photo-o/0f/63/0b/2f/kup-selaleleri.jpg" alt="Aladağ Küp Şelaleleri">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Adana_Tabiat_Nature.JPG" alt="Adana Yer Köprü">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/52/Varda_Viaduct_01.jpg" alt="Adana Varda Köprüsü">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/84/Adana_Nature_Example.jpg" alt="Adana 9 Oluk">
        <img src="https://instagram.fada1-2.fna.fbcdn.net/v/t51.2885-15/1234567890_abcdefg.jpg" alt="Adana Körkün Kanyonu">
    </div>
    <p>Adana, tarihi camileri, köprüleri, doğal şelaleleri ve kanyonları ile Güney’in en güzel şehirlerinden biridir.</p>
</section>

<!-- Osmaniye Yükleniyor Barı -->
<section class="loading-bar-section">
    <h3>Osmaniye ekleniyor...</h3>
    <div class="loading-bar">
        <div class="progress" id="osmaniye-progress"></div>
    </div>
</section>

<!-- Kaydırmalı Galeri -->
<section class="slider slide-in delay-2">
    <h2>Öne Çıkan Görseller</h2>
    <div class="slider-wrapper">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3d/Sabanci_Merkez_Camii_1.jpg" alt="Adana Merkez Camii">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/52/Varda_Viaduct_01.jpg" alt="Varda Köprüsü">
        <img src="https://media-cdn.tripadvisor.com/media/photo-o/0f/63/0b/2f/kup-selaleleri.jpg" alt="Aladağ Küp Şelaleleri">
    </div>
</section>

<script src="js/script.js"></script>
</body>
</html>
